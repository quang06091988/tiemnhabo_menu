<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fff8e1;
    --surface: #ffffff;
    --surface2: #fff3cd;
    --yellow: #ffc107;
    --yellow-dark: #f5a623;
    --orange: #ff7a3d;
    --green: #4a8c3a;
    --pink: #e6457a;
    --text: #3d2c0e;
    --text-muted: #8a7550;
    --divider: #ffe49a;
    --shadow: rgba(245, 166, 35, 0.25);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* HEADER */
  .hero {
    text-align: center;
    padding: 32px 20px 28px;
    background: linear-gradient(160deg, #ffd54f 0%, #ffb300 100%);
    position: relative;
    overflow: hidden;
    border-bottom-left-radius: 32px;
    border-bottom-right-radius: 32px;
    box-shadow: 0 4px 20px var(--shadow);
  }
  .hero-top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    font-size: 12px;
    color: #fff;
    text-align: left;
    margin-bottom: 8px;
  }
  .hero-ship {
    background: rgba(255,255,255,0.18);
    border-radius: 12px;
    padding: 6px 12px;
    line-height: 1.5;
  }
  .hero-ship-label {
    font-weight: 700;
    letter-spacing: 1px;
    font-size: 11px;
  }
  .hero-ship-phone {
    font-weight: 800;
    font-size: 14px;
    color: var(--pink);
    background: #fff;
    border-radius: 8px;
    padding: 2px 8px;
    display: inline-block;
    margin-top: 2px;
  }
  .hero-fb {
    background: rgba(255,255,255,0.18);
    border-radius: 12px;
    padding: 6px 12px;
    font-weight: 600;
  }
  .hero-ship, .hero-fb { text-decoration: none; color: #fff; cursor: pointer; }
  .brand-badge {
    width: 130px;
    height: 130px;
    background: #fff;
    border-radius: 50%;
    margin: 8px auto 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    border: 4px solid #fff9e0;
  }
  .brand-title {
    font-family: 'Baloo 2', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 1px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.12);
    margin-top: 8px;
  }
  .brand-menu-label {
    font-family: 'Baloo 2', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #4a2e00;
    letter-spacing: 4px;
    margin-top: 2px;
  }

  /* NAV TABS */
  .nav-wrap {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #fff;
    border-bottom: 2px solid var(--divider);
    padding: 0 16px;
    overflow-x: auto;
    white-space: nowrap;
    scrollbar-width: none;
  }
  .nav-wrap::-webkit-scrollbar { display: none; }
  .nav-tabs {
    display: inline-flex;
    gap: 4px;
    min-width: 100%;
    justify-content: center;
    padding: 10px 0;
  }
  .nav-tab {
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 20px;
    transition: all 0.2s;
    white-space: nowrap;
    background: var(--surface2);
    border: none;
    font-family: 'Be Vietnam Pro', sans-serif;
  }
  .nav-tab:hover { color: var(--orange); }
  .nav-tab.active {
    color: #fff;
    background: linear-gradient(135deg, var(--yellow-dark), var(--orange));
    box-shadow: 0 2px 8px var(--shadow);
  }

  /* SEARCH */
  .search-wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 16px 20px 4px;
  }
  .search-box {
    width: 100%;
    background: var(--surface2);
    border: 2px solid var(--divider);
    border-radius: 40px;
    padding: 10px 42px 10px 18px;
    color: var(--text);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px;
    font-weight: 400;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .search-box::placeholder { color: var(--text-muted); }
  .search-box:focus { border-color: var(--yellow-dark); }
  .search-inner { position: relative; }
  .search-clear {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    display: none;
  }
  #search-results {
    display: none;
    max-width: 680px;
    margin: 0 auto;
    padding: 12px 20px;
  }
  .search-result-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .search-empty {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    padding: 32px 0;
  }
  .item mark, .addon-item mark {
    background: #fff3a0;
    color: var(--text);
    font-weight: 700;
    border-radius: 3px;
    padding: 0 2px;
  }

  /* SECTIONS */
  .menu-section {
    display: none;
    max-width: 680px;
    margin: 0 auto;
    padding: 24px 20px;
  }
  .menu-section.active { display: block; }

  .section-header { text-align: center; margin-bottom: 20px; }
  .section-title {
    font-family: 'Baloo 2', sans-serif;
    font-size: 24px;
    font-weight: 800;
    color: var(--orange);
    letter-spacing: 0.5px;
  }

  /* SECTION BANNER */
  .section-banner {
    width: 100%;
    height: 110px;
    border-radius: 18px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 46px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 14px var(--shadow);
  }
  .banner-nuoc-ep   { background: linear-gradient(135deg, #ffd54f 0%, #ff9800 100%); }
  .banner-mix       { background: linear-gradient(135deg, #ffab40 0%, #ff5722 100%); }
  .banner-sinh-to   { background: linear-gradient(135deg, #ff8a80 0%, #ff5252 100%); }
  .banner-giai-khat { background: linear-gradient(135deg, #8d6e63 0%, #5d4037 100%); }

  /* ITEM LIST */
  .item-list { display: flex; flex-direction: column; gap: 0; }
  .item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 4px;
    border-bottom: 2px dashed var(--divider);
    gap: 10px;
  }
  .item:last-child { border-bottom: none; }
  .item-name-wrap { display: flex; flex-direction: column; flex: 1; }
  .item-name-row { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .item-name { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.4; }
  .item-desc {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
    line-height: 1.4;
  }
  .item-badge {
    font-size: 10px;
    background: var(--pink);
    color: #fff;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .item.sold-out { opacity: 0.5; }
  .item.sold-out .item-add,
  .item.sold-out .ml-btn { display: none; }
  .sold-out-badge {
    font-size: 10px;
    background: #8d6e63;
    color: #fff;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .item-fav-mark {
    color: var(--pink);
    font-size: 13px;
    margin-left: 5px;
    vertical-align: middle;
    line-height: 1;
  }

  /* SINGLE PRICE */
  .item-price {
    font-family: 'Baloo 2', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--orange);
    white-space: nowrap;
    min-width: 48px;
    text-align: right;
  }

  /* M/L PRICE BUTTONS */
  .ml-prices {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .ml-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border: 2px solid var(--divider);
    border-radius: 12px;
    padding: 5px 10px;
    cursor: pointer;
    min-width: 46px;
    transition: background 0.15s, border-color 0.15s;
  }
  .ml-btn:hover { border-color: var(--yellow-dark); }
  .ml-btn-size {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }
  .ml-btn-price {
    font-family: 'Baloo 2', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--orange);
  }

  /* ADD BTN */
  .item-add {
    background: linear-gradient(135deg, var(--yellow-dark), var(--orange));
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    line-height: 1;
    box-shadow: 0 2px 6px var(--shadow);
  }
  .item-add:active { transform: scale(0.92); }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 28px 20px 20px;
    max-width: 680px;
    margin: 0 auto;
  }
  .footer-mascot { font-size: 36px; margin-bottom: 8px; }
  .footer-links {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .footer-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .footer-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--yellow-dark);
  }
  .footer-value { font-size: 14px; color: var(--text-muted); font-weight: 500; }
  .footer-copy {
    font-family: 'Baloo 2', sans-serif;
    font-size: 14px;
    color: var(--orange);
    font-weight: 700;
    margin-top: 8px;
  }

  /* CALL BUTTON */
  .call-btn {
    position: fixed;
    bottom: 24px;
    left: 20px;
    z-index: 200;
    background: #0068ff;
    color: #fff;
    border: none;
    border-radius: 50px;
    width: 54px;
    height: 54px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(0,104,255,0.35);
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .call-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(0,104,255,0.5); }
  .call-btn:active { transform: scale(0.94); }

  /* CART BUTTON */
  .cart-btn {
    position: fixed;
    bottom: 24px;
    right: 20px;
    z-index: 200;
    background: linear-gradient(135deg, var(--yellow-dark), var(--orange));
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 20px;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 16px var(--shadow);
  }
  .cart-btn.hidden { display: none; }
  .cart-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 24px var(--shadow); }
  .cart-btn:active { transform: scale(0.94); }
  .cart-count {
    background: var(--pink);
    color: #fff;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }
  @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.25); } 100% { transform: scale(1); } }
  .pop { animation: pop 0.2s ease; }

  /* CART OVERLAY */
  .cart-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(61,44,14,0.5);
    z-index: 300;
  }
  .cart-overlay.open { display: block; }
  .cart-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-height: 80vh;
    background: #fff;
    border-radius: 24px 24px 0 0;
    z-index: 400;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }
  .cart-panel.open { transform: translateY(0); }
  .cart-header {
    padding: 20px 20px 14px;
    border-bottom: 2px dashed var(--divider);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .cart-title { font-family: 'Baloo 2', sans-serif; font-size: 19px; color: var(--orange); font-weight: 800; }
  .cart-close { background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; padding: 0; line-height: 1; }
  .cart-body { overflow-y: auto; flex: 1; padding: 8px 20px; }
  .cart-empty { text-align: center; color: var(--text-muted); font-size: 14px; padding: 40px 0; }
  .cart-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px dashed var(--divider);
  }
  .cart-item:last-child { border-bottom: none; }
  .cart-item-wrap { flex: 1; display: flex; flex-direction: column; }
  .cart-item-name { font-size: 14px; color: var(--text); font-weight: 500; }
  .cart-item-price {
    font-size: 14px;
    color: var(--orange);
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    min-width: 50px;
    text-align: right;
  }
  .cart-item-note {
    width: 100%;
    background: none;
    border: none;
    border-bottom: 1px solid var(--divider);
    color: var(--text-muted);
    font-size: 12px;
    padding: 4px 0;
    outline: none;
    margin-top: 4px;
  }
  .cart-item-note::placeholder { color: #d4b46a; }
  .cart-item-note:focus { border-color: var(--yellow-dark); color: var(--text); }
  .qty-control { display: flex; align-items: center; gap: 8px; }
  .qty-btn {
    background: var(--surface2);
    border: 2px solid var(--divider);
    border-radius: 50%;
    width: 26px;
    height: 26px;
    color: var(--orange);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .qty-num { font-size: 14px; color: var(--text); min-width: 16px; text-align: center; font-weight: 600; }
  .cart-footer { padding: 16px 20px 28px; border-top: 2px dashed var(--divider); flex-shrink: 0; }
  .cart-total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .cart-total-label { font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); }
  .cart-total-amount { font-family: 'Baloo 2', sans-serif; font-size: 24px; color: var(--orange); font-weight: 800; }
  .cart-call-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--yellow-dark), var(--orange));
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
  }
  .cart-call-btn:disabled { background: var(--surface2); color: var(--text-muted); cursor: not-allowed; }
  .cart-clear { width: 100%; background: none; border: none; color: var(--text-muted); font-size: 13px; cursor: pointer; margin-top: 10px; padding: 4px; }

  /* ORDER TYPE MODAL */
  .order-type-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(61,44,14,0.55);
    z-index: 600;
  }
  .order-type-overlay.open { display: block; }
  .order-type-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(180deg, #fffdf5 0%, #fff3cd 100%);
    border-radius: 28px 28px 0 0;
    z-index: 700;
    padding: 28px 20px 32px;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    box-shadow: 0 -8px 24px rgba(0,0,0,0.12);
  }
  .order-type-panel.open { transform: translateY(0); }
  .order-type-title {
    font-family: 'Baloo 2', sans-serif;
    font-size: 21px;
    font-weight: 800;
    color: var(--orange);
    text-align: center;
    margin-bottom: 20px;
  }
  .order-type-options { display: flex; flex-direction: column; gap: 14px; }
  .order-type-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #fff;
    border: 2px solid var(--divider);
    border-radius: 18px;
    padding: 16px 18px;
    cursor: pointer;
    text-align: left;
    font-family: 'Be Vietnam Pro', sans-serif;
    box-shadow: 0 3px 10px rgba(245, 166, 35, 0.12);
    transition: border-color 0.15s, transform 0.1s;
  }
  .order-type-btn:active { transform: scale(0.97); border-color: var(--yellow-dark); }
  .order-type-icon {
    font-size: 26px;
    flex-shrink: 0;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--yellow-dark), var(--orange));
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 8px var(--shadow);
  }
  .order-type-label { font-size: 16px; font-weight: 700; color: var(--text); font-family: 'Baloo 2', sans-serif; }
  .order-type-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  /* BILL VIEW (ship info + total additions) */
  .bill-ship-info {
    width: 100%;
    max-width: 320px;
    text-align: left;
  }
  .bill-ship-row { display: flex; gap: 8px; font-size: 15px; color: #fff8e1; margin-bottom: 6px; }
  .bill-ship-label { color: #d4b46a; min-width: 60px; }
  .bill-total-row {
    width: 100%;
    max-width: 320px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .bill-total-label { font-size: 14px; color: #d4b46a; letter-spacing: 1px; text-transform: uppercase; }
  .bill-total-amount { font-family: 'Baloo 2', sans-serif; font-size: 26px; font-weight: 800; color: #ffd54f; }

  /* BILL VIEW */
  .bill-view {
    display: none;
    position: fixed;
    inset: 0;
    background: #3d2c0e;
    z-index: 500;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    cursor: pointer;
  }
  .bill-view.open { display: flex; }
  .bill-divider { width: 100%; max-width: 320px; border: none; border-top: 1px dashed #6b5530; margin: 20px 0; }
  .bill-brand { font-family: 'Baloo 2', sans-serif; font-size: 22px; font-weight: 800; color: #ffd54f; letter-spacing: 3px; text-align: center; }
  .bill-table-row { display: flex; align-items: center; gap: 12px; margin: 4px 0 0; }

  /* MENU STATUS (loading / error) */

  /* BILL — nút gửi đơn qua Zalo */

</style>
</head>

<script>
// ── NAVIGATION ──────────────────────────────────────────
function showSection(id) {
  if (document.getElementById('search-input').value.trim()) clearSearch();
  document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const btn = document.querySelector(".nav-tab[onclick=\"showSection('" + id + "')\"]");
  if (btn) { btn.classList.add('active'); btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); }
}

// ── SEARCH ──────────────────────────────────────────────
function removeAccents(str) {
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/Đ/g, 'D').toLowerCase();
}

function clearSearch() {
  const input = document.getElementById('search-input');
  input.value = '';
  document.getElementById('search-clear').style.display = 'none';
  document.getElementById('search-results').style.display = 'none';
  document.querySelectorAll('.menu-section').forEach(s => {
    s.style.display = '';
    s.querySelectorAll('.item, .addon-item').forEach(i => {
      i.style.display = '';
      if (i.dataset.orig) i.innerHTML = i.dataset.orig;
    });
  });
  const activeTab = document.querySelector('.nav-tab.active');
  if (activeTab) {
    const id = activeTab.getAttribute('onclick').match(/'([^']+)'/)[1];
    document.getElementById(id).classList.add('active');
  } else {
    // Fallback: tab đầu tiên hiện có (không phụ thuộc ID cố định, vì menu được tải động từ Sheet)
    const firstTab = document.querySelector('.nav-tab');
    if (firstTab) {
      const id = firstTab.getAttribute('onclick').match(/'([^']+)'/)[1];
      const firstSection = document.getElementById(id);
      if (firstSection) firstSection.classList.add('active');
    }
  }
}

document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  const clearBtn = document.getElementById('search-clear');
  const resultsDiv = document.getElementById('search-results');

  if (!q) { clearSearch(); return; }
  clearBtn.style.display = 'block';

  document.querySelectorAll('.menu-section').forEach(s => s.style.display = 'none');
  resultsDiv.style.display = 'block';

  const allItems = document.querySelectorAll('.menu-section .item, .menu-section .addon-item');
  const matches = [];
  const qNoAccent = removeAccents(q);
  allItems.forEach(item => {
    if (!item.dataset.orig) item.dataset.orig = item.innerHTML;
    const text = item.dataset.orig;
    const plain = text.replace(/<[^>]+>/g, '').toLowerCase();
    const plainNoAccent = removeAccents(plain);
    if (plain.includes(q) || plainNoAccent.includes(qNoAccent)) matches.push({ item, text, plain });
  });

  if (matches.length === 0) {
    resultsDiv.innerHTML = '<div class="search-empty">Không tìm thấy món "<strong>' + escapeHtml(this.value) + '</strong>"</div>';
    return;
  }

  const qNoAccentH = removeAccents(q);

  function buildPosMap(original) {
    const origChars = [...original];
    const map = [];
    for (let i = 0; i < origChars.length; i++) {
      const na = removeAccents(origChars[i]);
      for (let j = 0; j < na.length; j++) map.push(i);
    }
    map.push(origChars.length);
    return map;
  }

  function highlightText(html) {
    return html.replace(/(<[^>]+>)|([^<]+)/g, (match, tag, text) => {
      if (tag) return tag;
      if (!text) return '';
      const textNA = removeAccents(text);
      const posMap = buildPosMap(text);
      let result = '';
      let i = 0;
      while (i < textNA.length) {
        const idx = textNA.indexOf(qNoAccentH, i);
        if (idx === -1) { result += text.slice(posMap[i]); break; }
        const origStart = posMap[idx];
        const origEnd = posMap[idx + qNoAccentH.length];
        result += text.slice(posMap[i], origStart) + '<mark>' + text.slice(origStart, origEnd) + '</mark>';
        i = idx + qNoAccentH.length;
      }
      return result;
    });
  }

  let html = '<div class="search-result-label">' + matches.length + ' kết quả cho "' + escapeHtml(this.value) + '"</div><div class="item-list">';
  matches.forEach(({ item, text }) => {
    const highlighted = highlightText(text);
    // Giữ nguyên class gốc (gồm "sold-out" nếu món hết hàng) để ẩn đúng nút thêm vào giỏ
    html += '<div class="' + item.className + '">' + highlighted + '</div>';
  });
  html += '</div>';
  resultsDiv.innerHTML = html;
});

// ── CART ──────────────────────────────────────────────
const cart = {}; // { "Tên món|giá": { name, price, qty, note } }

// Giữ giỏ qua lần refresh trong cùng phiên (tự xoá khi đóng tab → không lệch menu mới)
const CART_KEY = 'tiemnhabo_cart_v1';
function saveCart() {
  try { sessionStorage.setItem(CART_KEY, JSON.stringify(cart)); } catch (e) {}
}
function loadCart() {
  try {
    const raw = sessionStorage.getItem(CART_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (!data || typeof data !== 'object') return;
    Object.keys(data).forEach(k => {
      const it = data[k];
      if (it && typeof it.name === 'string' && typeof it.price === 'number' && it.qty > 0) {
        cart[k] = { name: it.name, price: it.price, qty: it.qty, note: typeof it.note === 'string' ? it.note : '' };
      }
    });
  } catch (e) {}
}

function addToCart(name, priceStr, triggerBtn) {
  // Chặn ở tầng logic, không chỉ dựa vào CSS ẩn nút — phòng DevTools / race condition hiếm
  if (triggerBtn) {
    const itemEl = triggerBtn.closest('.item');
    if (itemEl && itemEl.classList.contains('sold-out')) return;
  }

  const price = Math.round(parseFloat(priceStr.replace('k','')) * 1000);
  const key = name + '|' + price;
  if (cart[key]) { cart[key].qty++; }
  else { cart[key] = { name, price, qty: 1 }; }
  updateCartUI();

  if (navigator.vibrate) navigator.vibrate(30);

  const btn = document.getElementById('cart-btn');
  btn.classList.remove('pop');
  void btn.offsetWidth;
  btn.classList.add('pop');
}

// Event delegation — không nhồi tên món vào onclick, an toàn với dấu ' và "
document.addEventListener('click', function(e) {
  const add = e.target.closest('.item-add');
  if (add && add.dataset.name) { addToCart(add.dataset.name, add.dataset.price, add); return; }
  const ml = e.target.closest('.ml-btn');
  if (ml && ml.dataset.name) { addToCart(ml.dataset.name, ml.dataset.price, ml); return; }
  const qty = e.target.closest('.qty-btn');
  if (qty) {
    const row = qty.closest('.cart-item');
    if (row) changeQty(row.dataset.key, parseInt(qty.dataset.delta, 10));
  }
});
document.addEventListener('input', function(e) {
  const note = e.target.closest('.cart-item-note');
  if (note) {
    const row = note.closest('.cart-item');
    if (row) updateNote(row.dataset.key, note.value);
  }
});

function renderCartBody() {
  const items = Object.values(cart).filter(i => i.qty > 0);
  const body = document.getElementById('cart-body');
  if (items.length === 0) {
    body.innerHTML = '<div class="cart-empty">Chưa có món nào 🍃</div>';
    return;
  }
  // Chỉ render lại khi danh sách món đổi (thêm/bớt), không render lại khi chỉ đổi số lượng
  const newKeys = items.map(i => i.name + '|' + i.price).join(',');
  if (body.dataset.keys === newKeys) {
    items.forEach(item => {
      const key = item.name + '|' + item.price;
      const el = body.querySelector(`[data-key="${CSS.escape(key)}"]`);
      if (!el) return;
      el.querySelector('.qty-num').textContent = item.qty;
      el.querySelector('.cart-item-price').textContent = ((item.price * item.qty)/1000).toFixed(0) + 'k';
    });
    return;
  }
  body.dataset.keys = newKeys;
  body.innerHTML = items.map(item => {
    const key = item.name + '|' + item.price;
    const safeKey = escapeHtml(key);
    const subtotal = ((item.price * item.qty)/1000).toFixed(0) + 'k';
    return `<div class="cart-item" data-key="${safeKey}">
      <div class="cart-item-wrap">
        <div class="cart-item-name">${escapeHtml(item.name)}</div>
        <input class="cart-item-note" type="text" placeholder="Ghi chú... (ít đường, ít đá...)" value="${escapeHtml(item.note || '')}">
      </div>
      <div class="qty-control">
        <button class="qty-btn" data-delta="-1">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" data-delta="1">+</button>
      </div>
      <div class="cart-item-price">${subtotal}</div>
    </div>`;
  }).join('');
}

function updateCartUI() {
  const items = Object.values(cart).filter(i => i.qty > 0);
  const totalQty = items.reduce((s, i) => s + i.qty, 0);
  const totalPrice = items.reduce((s, i) => s + i.qty * i.price, 0);

  const btn = document.getElementById('cart-btn');
  document.getElementById('cart-count').textContent = totalQty;
  btn.classList.toggle('hidden', totalQty === 0);

  document.getElementById('cart-total').textContent =
    totalPrice >= 1000 ? (totalPrice/1000).toFixed(0) + 'k' : totalPrice + 'đ';

  document.getElementById('cart-call-btn').disabled = totalQty === 0;

  renderCartBody();
  saveCart();
}

function changeQty(key, delta) {
  if (!cart[key]) return;
  cart[key].qty += delta;
  if (cart[key].qty <= 0) {
    delete cart[key];
    document.getElementById('cart-body').dataset.keys = '';
  }
  updateCartUI();
}

function updateNote(key, value) {
  if (cart[key]) { cart[key].note = value; saveCart(); }
}

function clearCart() {
  Object.keys(cart).forEach(k => delete cart[k]);
  document.getElementById('cart-body').dataset.keys = '';
  updateCartUI();
  closeCart();
}

function openCart() {
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-panel').classList.add('open');
}

function closeCart() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-panel').classList.remove('open');
}

// ── ORDER TYPE FLOW ─────────────────────────────────────
let currentOrderType = null; // 'quan' | 'ship'
let shopZaloPhone = '';

function openOrderTypeModal() {
  const items = Object.values(cart).filter(i => i.qty > 0);
  if (items.length === 0) return;
  document.getElementById('order-type-overlay').classList.add('open');
  document.getElementById('order-type-panel').classList.add('open');
}

function closeOrderTypeModal() {
  document.getElementById('order-type-overlay').classList.remove('open');
  document.getElementById('order-type-panel').classList.remove('open');
}

function selectOrderType(type) {
  currentOrderType = type;
  closeOrderTypeModal();
  openBillView();
}

function openBillView() {
  const items = Object.values(cart).filter(i => i.qty > 0);
  if (items.length === 0) return;

  document.getElementById('bill-items').innerHTML = items.map(item =>
    `<div class="bill-item-row">
      <span class="bill-item-qty">${item.qty}x</span>
      <span class="bill-item-name">${escapeHtml(item.name)}</span>
    </div>${item.note ? `<div class="bill-item-note">↳ ${escapeHtml(item.note)}</div>` : ''}`
  ).join('');

  const tableRow = document.getElementById('bill-table-row');
  const shipFields = document.getElementById('bill-ship-fields');

  // Tổng cộng luôn hiện cho cả 2 trường hợp
  const totalPrice = items.reduce((s, i) => s + i.qty * i.price, 0);
  document.getElementById('bill-total-amount').textContent = (totalPrice/1000).toFixed(0) + 'k';

  if (currentOrderType === 'ship') {
    tableRow.style.display = 'none';
    shipFields.style.display = 'flex';
    // Chỉ hiện nút "Gửi đơn qua Zalo" khi Footer có Số điện thoại
    document.getElementById('bill-zalo-btn').style.display = shopZaloPhone ? 'flex' : 'none';
    document.getElementById('bill-zalo-hint').style.display = 'none';
  } else {
    tableRow.style.display = 'flex';
    shipFields.style.display = 'none';
    document.getElementById('bill-zalo-btn').style.display = 'none';
  }

  closeCart();
  document.getElementById('bill-view').classList.add('open');
  // Không auto-focus — khách chỉ chìa màn hình, không cần bàn phím bật sẵn
}

function closeBillView() {
  document.getElementById('bill-view').classList.remove('open');
  document.getElementById('bill-table').value = '';
  document.getElementById('bill-ship-name').value = '';
  document.getElementById('bill-ship-phone').value = '';
  document.getElementById('bill-ship-address').value = '';
  currentOrderType = null;
}

function buildOrderText() {
  const items = Object.values(cart).filter(i => i.qty > 0);
  const name = document.getElementById('bill-ship-name').value.trim();
  const phone = document.getElementById('bill-ship-phone').value.trim();
  const address = document.getElementById('bill-ship-address').value.trim();
  const totalPrice = items.reduce((s, i) => s + i.qty * i.price, 0);
  const sep = '————————————';
  const lines = ['ĐƠN HÀNG — TIỆM NHÀ BƠ', sep];
  const contact = [];
  if (name)    contact.push('Khách: ' + name);
  if (phone)   contact.push('SĐT: ' + phone);
  if (address) contact.push('Địa chỉ: ' + address);
  if (contact.length) { lines.push(...contact, sep); }
  items.forEach(i => {
    lines.push(i.qty + 'x ' + i.name);
    if (i.note) lines.push('   • ' + i.note);
  });
  lines.push(sep, 'Tổng: ' + (totalPrice / 1000).toFixed(0) + 'k');
  return lines.join('\n');
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta);
}

function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function sendOrderZalo() {
  copyText(buildOrderText());
  const hint = document.getElementById('bill-zalo-hint');
  if (shopZaloPhone) {
    window.open('https://zalo.me/' + shopZaloPhone, '_blank', 'noopener');
    hint.textContent = '✓ Đã sao chép đơn — dán vào khung chat Zalo rồi bấm gửi nhé';
  } else {
    hint.textContent = '✓ Đã sao chép đơn — dán vào Zalo gửi cho quán nhé';
  }
  hint.style.display = 'block';
}

let toastTimer = null;
function showToast(msg) {
  let t = document.getElementById('app-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'app-toast';
    t.className = 'app-toast';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

// ── DYNAMIC MENU + FOOTER FROM GOOGLE SHEET (KHÔNG CÓ DỰ PHÒNG TĨNH) ──
const MENU_TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQcNc6FdGhb-73J3Owg7hnQ2kjYpdHwiDX6Q4mB5QQukDBRiNTWNLUsfrNIVr_3UvLSA3VRGDacRT-Y/pub?gid=895902518&single=true&output=tsv';
// Footer dùng chung token "Xuất bản lên web" với Menu, chỉ khác gid (tab Footer = 1143755591).
const FOOTER_TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQcNc6FdGhb-73J3Owg7hnQ2kjYpdHwiDX6Q4mB5QQukDBRiNTWNLUsfrNIVr_3UvLSA3VRGDacRT-Y/pub?gid=1143755591&single=true&output=tsv';
const MAX_RETRIES = 3;
const RETRY_DELAY_MS = 1200;

// Banner icon + gradient class xoay vòng cho tab mới chưa từng định nghĩa
const KNOWN_TAB_STYLE = {
  'Nước Ép':      { icon: '🍊', bannerClass: 'banner-nuoc-ep' },
  'Nước Ép Mix':  { icon: '🥕', bannerClass: 'banner-mix' },
  'Sinh Tố':      { icon: '🥑', bannerClass: 'banner-sinh-to' },
  'Giải Khát':    { icon: '☕', bannerClass: 'banner-giai-khat' },
};
const FALLBACK_TAB_STYLES = [
  { icon: '🍹', bannerClass: 'banner-nuoc-ep' },
  { icon: '🍓', bannerClass: 'banner-sinh-to' },
  { icon: '🍯', bannerClass: 'banner-mix' },
  { icon: '🍪', bannerClass: 'banner-giai-khat' },
];

function tabSlug(tabName) {
  // "Nước Ép Mix" -> "nuoc-ep-mix" (slug ổn định, dùng làm id)
  return tabName
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/đ/gi, 'd')
    .toLowerCase()
    .trim()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function parsePriceVN(str) {
  if (!str || !str.trim()) return null;
  const digits = str.trim().replace(/\./g, '').replace(/,/g, '');
  const n = parseInt(digits, 10);
  return isNaN(n) ? null : n;
}

function priceToKStr(n) {
  return Math.round(n / 1000) + 'k';
}

function escapeHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function buildItemHtml(row) {
  const name = (row['Tên món'] || '').trim();
  const desc = (row['Mô tả'] || '').trim();
  const priceM = parsePriceVN(row['Giá M']);
  const priceL = parsePriceVN(row['Giá L']);
  const priceSingle = parsePriceVN(row['Giá (1 loại)']);
  const soldOut = (row['Hết hàng (x = hết)'] || '').trim().toLowerCase() === 'x';
  const isFav = (row['Yêu thích (x = có)'] || '').trim().toLowerCase() === 'x';

  const safeName = escapeHtml(name);
  const safeDesc = escapeHtml(desc);
  const descHtml = desc ? `<span class="item-desc">${safeDesc}</span>` : '';
  const soldOutClass = soldOut ? ' sold-out' : '';
  const soldOutBadge = soldOut ? '<span class="sold-out-badge">Hết hàng</span>' : '';
  const favMark = isFav ? '<span class="item-fav-mark" aria-label="Món yêu thích">♥</span>' : '';

  if (priceM !== null && priceL !== null) {
    const mStr = priceToKStr(priceM);
    const lStr = priceToKStr(priceL);
    return `<div class="item${soldOutClass}"><div class="item-name-wrap"><div class="item-name-row"><span class="item-name">${safeName}${favMark}</span>${soldOutBadge}</div>${descHtml}</div><div class="ml-prices"><div class="ml-btn" data-name="${safeName} (M)" data-price="${mStr}"><span class="ml-btn-size">M</span><span class="ml-btn-price">${mStr}</span></div><div class="ml-btn" data-name="${safeName} (L)" data-price="${lStr}"><span class="ml-btn-size">L</span><span class="ml-btn-price">${lStr}</span></div></div></div>`;
  } else {
    // Không có giá hợp lệ thì không cho thêm vào giỏ (tránh đơn 0đ do thiếu dữ liệu)
    const priceStr = priceSingle !== null ? priceToKStr(priceSingle) : '—';
    const addBtn = priceSingle !== null
      ? `<button class="item-add" data-name="${safeName}" data-price="${priceStr}" aria-label="Thêm ${safeName}">+</button>`
      : '';
    return `<div class="item${soldOutClass}"><div class="item-name-wrap"><div class="item-name-row"><span class="item-name">${safeName}${favMark}</span>${soldOutBadge}</div>${descHtml}</div><span class="item-price">${priceStr}</span>${addBtn}</div>`;
  }
}

function parseTSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const headers = lines[0].split('\t').map(h => h.trim());
  return lines.slice(1).map(line => {
    const cells = line.split('\t');
    const row = {};
    headers.forEach((h, i) => row[h] = cells[i] !== undefined ? cells[i] : '');
    return row;
  });
}

function buildSectionHtml(sectionId, tabName, tabRows, isFirst, styleIndex) {
  const known = KNOWN_TAB_STYLE[tabName];
  const style = known || FALLBACK_TAB_STYLES[styleIndex % FALLBACK_TAB_STYLES.length];
  const itemsHtml = tabRows.map(buildItemHtml).join('');
  return `<section class="menu-section${isFirst ? ' active' : ''}" id="${sectionId}">
    <div class="section-banner ${style.bannerClass}"><span>${style.icon}</span></div>
    <div class="section-header"><div class="section-title">${escapeHtml(tabName)}</div></div>
    <div class="item-list">${itemsHtml}</div>
  </section>`;
}

function showMenuLoadingState() {
  const status = document.getElementById('menu-status');
  status.classList.remove('hidden');
  status.innerHTML = `<div class="menu-status-spinner"></div><div class="menu-status-text">Đang tải menu...</div>`;
}

function showMenuErrorState(retryFn) {
  const status = document.getElementById('menu-status');
  status.classList.remove('hidden');
  status.innerHTML = `<div class="menu-status-text">Không tải được menu, vui lòng thử lại.</div><button class="menu-status-retry-btn" id="menu-retry-btn">Thử lại</button>`;
  document.getElementById('menu-retry-btn').onclick = retryFn;
}

function hideMenuStatus() {
  document.getElementById('menu-status').classList.add('hidden');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function fetchTSVOnce(url, requiredCol) {
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error('Fetch failed: ' + res.status);
  const text = await res.text();
  const rows = parseTSV(text).filter(r => r[requiredCol] && r[requiredCol].trim());
  if (rows.length === 0) throw new Error('No rows parsed for ' + url);
  return rows;
}

async function fetchWithRetry(url, requiredCol) {
  let lastErr = null;
  for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
    try {
      return await fetchTSVOnce(url, requiredCol);
    } catch (err) {
      lastErr = err;
      console.warn(`Lần thử ${attempt}/${MAX_RETRIES} thất bại (${url}):`, err);
      if (attempt < MAX_RETRIES) await sleep(RETRY_DELAY_MS);
    }
  }
  throw lastErr;
}

async function loadMenuFromSheet() {
  const searchInput = document.getElementById('search-input');
  searchInput.disabled = true;
  searchInput.placeholder = 'Đang tải menu...';
  showMenuLoadingState();

  let menuRows;
  try {
    menuRows = await fetchWithRetry(MENU_TSV_URL, 'Tên món');
  } catch (err) {
    console.error('Không tải được menu sau', MAX_RETRIES, 'lần thử:', err);
    showMenuErrorState(loadMenuFromSheet);
    return;
  }

  // ── Render Menu ──
  const tabOrder = [];
  const byTab = {};
  menuRows.forEach(row => {
    const tab = (row['Tab'] || '').trim();
    if (!tab) return;
    if (!byTab[tab]) { byTab[tab] = []; tabOrder.push(tab); }
    byTab[tab].push(row);
  });

  if (tabOrder.length === 0) {
    showMenuErrorState(loadMenuFromSheet);
    return;
  }

  const navTabsHtml = tabOrder.map((tabName, i) => {
    const sectionId = tabSlug(tabName);
    return `<button class="nav-tab${i === 0 ? ' active' : ''}" onclick="showSection('${sectionId}')">${escapeHtml(tabName)}</button>`;
  }).join('');

  const sectionsHtml = tabOrder.map((tabName, i) => {
    const sectionId = tabSlug(tabName);
    return buildSectionHtml(sectionId, tabName, byTab[tabName], i === 0, i);
  }).join('');

  document.querySelector('.nav-tabs').innerHTML = navTabsHtml;
  document.querySelectorAll('.menu-section').forEach(el => el.remove());
  document.getElementById('search-results').insertAdjacentHTML('afterend', sectionsHtml);
  document.querySelectorAll('.menu-section .item, .menu-section .addon-item').forEach(el => {
    el.dataset.orig = el.innerHTML;
  });

  hideMenuStatus();
  searchInput.disabled = false;
  searchInput.placeholder = 'Tìm món... vd: cam, bơ, cà phê';

  console.log('Menu loaded from Google Sheet:', tabOrder);

  // Footer tải riêng, không chặn menu (thất bại thì phần footer info/nút để trống, không có dự phòng tĩnh)
  loadFooter();
}

// ── FOOTER (best-effort: thất bại cũng không chặn menu) ──
async function loadFooter() {
  let footerRows = null;
  for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
    try { footerRows = await fetchTSVOnce(FOOTER_TSV_URL, 'Trường'); break; }
    catch (err) {
      console.warn(`Footer lần thử ${attempt}/${MAX_RETRIES} thất bại:`, err);
      if (attempt < MAX_RETRIES) await sleep(RETRY_DELAY_MS);
    }
  }
  if (footerRows) renderFooter(footerRows);
  else console.warn('Không tải được Footer sau', MAX_RETRIES, 'lần thử (footer info/nút để trống).');
}

function renderFooter(footerRows) {
  const footerMap = {};
  footerRows.forEach(row => {
    const field = (row['Trường'] || '').trim();
    const value = (row['Giá trị'] || '').trim();
    if (field) footerMap[field] = value;
  });

  const mapName = footerMap['Google Maps'] || '';
  const mapLink = footerMap['Link Google Maps'] || '';
  const bankName = footerMap['Ngân Hàng'] || '';
  const qrLink = footerMap['Quick Link VietQR'] || '';
  const tiktokName = footerMap['TikTok'] || '';
  const tiktokLink = footerMap['Link TikTok'] || '';
  const fanpageName = footerMap['Fanpage'] || '';
  const fanpageLink = footerMap['Link Fanpage'] || '';

  const tiktokIcon = `<svg class="footer-social-icon" viewBox="0 0 48 48" fill="currentColor"><path d="M41 17.2a13.6 13.6 0 0 1-8-2.6v15.4c0 6.6-5.4 12-12 12S9 36.6 9 30s5.4-12 12-12c.7 0 1.3.1 2 .2v6.2a6 6 0 1 0 4 5.6V4h6c0 .5 0 1 .1 1.5A7.6 7.6 0 0 0 41 11.4z"/></svg>`;
  const fbIcon = `<svg class="footer-social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.2c-1.2 0-1.6.8-1.6 1.6V12h2.7l-.4 2.9h-2.3v7A10 10 0 0 0 22 12z"/></svg>`;
  const gmapIcon = `<svg class="footer-social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C7.6 2 4 5.6 4 10c0 5.2 7 11.5 7.3 11.8.4.3 1 .3 1.4 0C13 21.5 20 15.2 20 10c0-4.4-3.6-8-8-8zm0 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/></svg>`;
  const qrIcon = `<svg class="footer-social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h7v7H3V3zm2 2v3h3V5H5zm9-2h7v7h-7V3zm2 2v3h3V5h-3zM3 14h7v7H3v-7zm2 2v3h3v-3H5zm9-2h2v2h-2v-2zm5 0h2v2h-2v-2zm-5 3h2v2h-2v-2zm3 0h2v2h-2v-2zm2 2h2v2h-2v-2zm-5 0h2v2h-2v-2z"/></svg>`;

  // Hàng thông tin (chỉ chữ): Địa chỉ · Giờ mở cửa · WiFi — ẩn mục nào không có dữ liệu
  const infoFields = [
    { label: 'Địa chỉ',    value: (footerMap['Địa chỉ'] || '').trim() },
    { label: 'Giờ mở cửa', value: (footerMap['Giờ mở cửa'] || '').trim() },
    { label: 'WiFi',       value: (footerMap['WiFi'] || '').trim() },
  ];
  const footerInfoHtml = infoFields.filter(f => f.value).map(f => `
    <div class="footer-item">
      <span class="footer-label">${escapeHtml(f.label)}</span>
      <span class="footer-value">${escapeHtml(f.value)}</span>
    </div>`).join('');
  // Footer 100% theo Sheet (không còn dự phòng tĩnh) — Sheet trống mục info thì để trống luôn
  document.getElementById('footer-links').innerHTML = footerInfoHtml;

  // Hàng nút pill — mỗi nút: tên + link từ Sheet. Trống cả tên lẫn link thì ẩn.
  const footerBtns = [
    { name: mapName,     link: mapLink,     icon: gmapIcon,   field: 'Google Maps' },
    { name: bankName,    link: qrLink,      icon: qrIcon,     field: 'Ngân Hàng' },
    { name: tiktokName,  link: tiktokLink,  icon: tiktokIcon, field: 'TikTok' },
    { name: fanpageName, link: fanpageLink, icon: fbIcon,     field: 'Fanpage' },
  ];
  const actions = footerBtns.map(b => {
    if (!b.name && !b.link) return '';
    const text = b.name || b.field;
    return b.link
      ? `<a class="footer-pill" href="${escapeHtml(b.link)}" target="_blank" rel="noopener">${b.icon}${escapeHtml(text)}</a>`
      : `<span class="footer-pill">${b.icon}${escapeHtml(text)}</span>`;
  }).filter(Boolean).join('');
  document.getElementById('footer-actions').innerHTML = actions;

  // Cập nhật nút Zalo nổi theo SĐT từ Sheet (ẩn nếu chưa có số)
  const phone = (footerMap['Số điện thoại'] || '').replace(/[^0-9]/g, '');
  const callBtn = document.getElementById('call-btn');
  if (phone) {
    shopZaloPhone = phone;
    callBtn.setAttribute('href', 'https://zalo.me/' + phone);
    callBtn.style.display = 'flex';
  } else {
    callBtn.style.display = 'none';
  }

  // Hero: "Alo Ship" (SĐT, bấm gọi) + Fanpage — động từ Sheet, ẩn nếu trống (không còn chữ tĩnh)
  const heroShip = document.getElementById('hero-ship');
  const heroShipPhone = document.getElementById('hero-ship-phone');
  if (phone) {
    const pretty = phone.length >= 10
      ? phone.slice(0,4) + '.' + phone.slice(4,7) + '.' + phone.slice(7)
      : phone;
    heroShipPhone.textContent = pretty;
    heroShip.setAttribute('href', 'tel:' + phone);
    heroShip.style.display = '';
  } else {
    heroShip.style.display = 'none';
  }
  const heroFb = document.getElementById('hero-fb');
  if (fanpageName || fanpageLink) {
    heroFb.textContent = 'FB: ' + (fanpageName || 'Fanpage');
    if (fanpageLink) {
      heroFb.setAttribute('href', fanpageLink);
      heroFb.setAttribute('target', '_blank');
      heroFb.setAttribute('rel', 'noopener');
    } else {
      heroFb.removeAttribute('href');
    }
    heroFb.style.display = '';
  } else {
    heroFb.style.display = 'none';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  loadCart();
  updateCartUI();
  loadMenuFromSheet();
});

// Esc đóng bill view / popup / giỏ
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Escape') return;
  closeBillView();
  closeOrderTypeModal();
  closeCart();
});
